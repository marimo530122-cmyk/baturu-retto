<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お題ジェネレーター 動作テスト</title>
  <style>
    body {
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      max-width: 560px;
      margin: 40px auto;
      padding: 0 16px;
      background: #1a1a2e;
      color: #fff;
      text-align: center;
    }
    h1 { font-size: 22px; }
    input {
      font-size: 18px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 6px;
      width: 40%;
      text-align: center;
    }
    button {
      font-size: 20px;
      font-weight: bold;
      padding: 14px 32px;
      margin-top: 16px;
      border: none;
      border-radius: 12px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
    }
    button:active { transform: scale(0.96); }
    #result {
      margin-top: 28px;
      padding: 24px;
      border-radius: 16px;
      background: #16213e;
      font-size: 22px;
      line-height: 1.8;
      min-height: 120px;
      white-space: pre-line; /* 改行をそのまま表示 */
    }
  </style>
</head>
<body>
  <h1>🎯 お題ジェネレーター テスト</h1>
  <p>名前を入れてボタンを押すと、2500通りの中からお題が生成され、音声で朗読されます。</p>

  <div>
    <input id="fromName" value="たろう" placeholder="お題をやる人" />
    <input id="toName" value="はなこ" placeholder="相手の人" />
  </div>

  <button id="generateBtn">🎰 お題を生成して朗読！</button>

  <div id="result">ここにお題が表示されます</div>

  <script src="odai-generator.js"></script>
  <script>
    document.getElementById("generateBtn").addEventListener("click", () => {
      const fromName = document.getElementById("fromName").value || "だれか";
      const toName = document.getElementById("toName").value || "だれか";

      // ★ ルーレットが止まった瞬間に、この2行を呼ぶだけでOK ★
      const odai = generateOdai(fromName, toName);
      document.getElementById("result").textContent = odai.displayText;
      speakOdai(odai.speechText);
    });
  </script>
</body>
</html>
