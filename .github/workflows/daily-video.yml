name: Daily Video Generation

on:
  schedule:
    # 毎日 23:00 UTC = 08:00 JST
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install moviepy==1.0.3 Pillow==12.3.0 numpy==2.5.1

      - name: Generate today's video
        run: |
          mkdir -p daily
          python tools/video-generator/generate_video.py JP --duration 15 --output daily/_raw.mp4

      - name: Make video mobile/streaming friendly (faststart)
        run: |
          ffmpeg -y -i daily/_raw.mp4 -c copy -movflags +faststart daily/latest.mp4
          rm daily/_raw.mp4

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily/latest.mp4
          git diff --staged --quiet || git commit -m "chore: 本日分の動画を自動生成 ($(date -u +%Y-%m-%d))"
          git push
